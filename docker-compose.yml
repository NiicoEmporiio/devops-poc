version: '3.8'

services:
  # =========================
  # HESK DATABASE
  # =========================
  db:
    image: mysql:5.7
    container_name: hesk_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: hesk
      MYSQL_USER: heskuser
      MYSQL_PASSWORD: heskpass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - hesk_net

  # =========================
  # HESK WEB
  # =========================
  web:
    build: .
    container_name: hesk_web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./hesk:/var/www/html
    depends_on:
      - db
    networks:
      - hesk_net

  # =========================
  # ZABBIX DATABASE
  # =========================
  zabbix-db:
    image: mysql:8.0
    container_name: zabbix_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbixpass
    volumes:
      - zabbix_db_data:/var/lib/mysql
    networks:
      - hesk_net

  # =========================
  # ZABBIX SERVER
  # =========================
  zabbix-server:
    image: zabbix/zabbix-server-mysql:latest
    container_name: zabbix_server
    restart: always
    environment:
      DB_SERVER_HOST: zabbix-db
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbixpass
      MYSQL_ROOT_PASSWORD: rootpass
    depends_on:
      - zabbix-db
    ports:
      - "10051:10051"
    networks:
      - hesk_net

  # =========================
  # ZABBIX WEB
  # =========================
  zabbix-web:
    image: zabbix/zabbix-web-apache-mysql:latest
    container_name: zabbix_web
    restart: always
    environment:
      DB_SERVER_HOST: zabbix-db
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbixpass
      PHP_TZ: America/Argentina/Buenos_Aires
    depends_on:
      - zabbix-server
    ports:
      - "8081:8080"
    networks:
      - hesk_net

  # =========================
  # ZABBIX AGENT
  # =========================
  zabbix-agent:
    image: zabbix/zabbix-agent:latest
    container_name: zabbix_agent
    restart: always
    networks:
      - hesk_net

# =========================
# VOLUMES
# =========================
volumes:
  db_data:
  zabbix_db_data:

# =========================
# NETWORK
# =========================
networks:
  hesk_net: